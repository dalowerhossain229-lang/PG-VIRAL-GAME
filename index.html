<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WILD BOUNTY BANDITS - PG SOFT OFFICIAL 3D SLOTS</title>
    <style>
        /* 🎨 ওরিজিনাল ৩-৪-৫-৫-৪-৩ কাউবয় মেগা থ্রি-ডি এরিনা সিএসএস ইনজেকশন ভাই ভাই */
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #050302; font-family: 'Segoe UI', Roboto, sans-serif; color: #fff; -webkit-tap-highlight-color: transparent; user-select: none; }
        .header { display: none !important; } 

        body { 
            background: radial-gradient(circle at center, #2e1d0f 0%, #060402 100%); 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            height: 100vh; 
            position: relative;
        }

        /* 👑 ওপরে রশি দিয়ে ঝুলন্ত বাঁকা কাঠের তক্তার ওরিজিনাল ওッズ ট্র্যাকার সিঁড়ি */
        .top-wooden-ladder {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 450px;
            margin: 12px auto 0 auto;
            padding: 10px 20px;
            box-sizing: border-box;
            background: linear-gradient(180deg, #472b15 0%, #261609 100%);
            border: 3px solid #6b401f;
            border-radius: 14px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.7), inset 0 2px 4px rgba(255,255,255,0.1);
        }
        .ladder-node-item {
            font-size: 14px;
            font-weight: 900;
            color: #7a5431;
            text-shadow: 2px 2px 3px rgba(0,0,0,0.9);
            transition: all 0.2s ease;
        }
        .ladder-node-item.active {
            color: #ffaa00;
            font-size: 18px;
            text-shadow: 0 0 10px rgba(255,170,0,0.6), 2px 2px 2px #000;
            transform: scale(1.1);
        }

        /* 🏟️ ৩,৬০০ WAYS দুই সাইডের কাঠের নোটিশ ব্যানার */
        .ways-wooden-holder {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 430px;
            margin: 5px auto 0 auto;
            padding: 0 10px;
            box-sizing: border-box;
        }
        .ways-label {
            font-size: 11px;
            font-weight: 900;
            color: #cc8844;
            background: #140b05;
            padding: 4px 12px;
            border-radius: 6px;
            border: 1px solid #3d220f;
            text-shadow: 1px 1px 2px #000;
            letter-spacing: 0.5px;
        }

        /* 🏟️ ওরিজিনাল ৩-৪-৫-৫-৪-৩ ডাইনামিক গ্রিড ক্যানভাস এরিনা Container */
        .grid-stadium-canvas {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 450px;
            height: 380px; /* ৩,৬০০ ওয়েজ ফুল ৩D হাইট লক ভাই ভাই */
            margin: 5px auto;
            padding: 0 10px;
            box-sizing: border-box;
            position: relative;
        }

        /* ডাইনামিক কলাম ট্র্যাকার */
        .column-pipe-node {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
            height: 100%;
            justify-content: center;
        }

        /* ওরিজিনাল ক্যাসিনো কার্ডের ব্যাকগ্রাউন্ড কাঠের খোপ */
        .card-slot-box {
            background: linear-gradient(180deg, #120904 0%, #050201 100%);
            border: 2px solid #2b170a;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: inset 0 0 12px rgba(0,0,0,0.9);
            transition: all 0.1s ease;
        }

        /* কলাম অনুযায়ী সুষম ৩-৪-৫-৫-৪-৩ হাইট বাউন্সার */
        .col-h-3 { height: 28%; }
        .col-h-4 { height: 22%; }
        .col-h-5 { height: 18%; }

        .symbol-img-node {
            width: 88%;
            height: 88%;
            object-fit: contain;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.85));
        }

        /* 🌀 ক্যাস্কেডিং ড্রপ ব্লার অ্যানিমেশন */
        .drop-cascading-blur {
            animation: cascadeDropAnim 0.12s linear infinite;
        }
        @keyframes reelSpinBlurAnim {
            0% { transform: translateY(-40px) scaleY(1.2); filter: blur(3px); }
            100% { transform: translateY(40px) scaleY(1.2); filter: blur(3px); }
        }

        /* 🚪 ডানদিকের ভাসমান FEATURE BUY বাটন */
        .feature-buy-wood-btn {
            position: absolute;
            right: 15px;
            bottom: 30px;
            background: linear-gradient(180deg, #593518 0%, #2e1807 100%);
            border: 2px solid #734520;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 900;
            color: #ffd480;
            text-transform: uppercase;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.6);
            z-index: 20;
            cursor: pointer;
        }

        /* 📢 উইন-লস ওরিজিনাল মিডল গোল্ডেন বার উইজেট */
        .center-dashboard-status {
            width: 100%;
            max-width: 430px;
            margin: 0 auto;
            background: linear-gradient(180deg, #2b180a 0%, #120903 100%);
            border: 2px solid #54341b;
            border-radius: 12px;
            padding: 10px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }
        .status-panel-sub { text-align: center; flex: 1; }
        .status-lbl { font-size: 9px; color: #8c6239; font-weight: bold; }
        .status-val { font-size: 14px; font-weight: 900; color: #fff; }

        /* 🎛️ একদম নিচের মেটালিক সুপ্রীম ওরিজিনাল PG SOFT কন্ট্রোল ফুটার */
        .bottom-metal-controls {
            background: #030201;
            border-top: 2px solid #1c1006;
            padding: 15px 20px 45px 20px;
            z-index: 100;
        }
        .action-flex-pack {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 450px;
            margin: 0 auto;
        }

        /* বিদ্যুৎ চমকানো টার্বো বাটন */
        .turbo-circle-btn {
            background: #140e0a;
            border: 2px solid #362216;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffaa00;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px 6px #000;
        }
        .turbo-circle-btn.active { background: #ffaa00; color: #000; box-shadow: 0 0 10px #ffaa00; }

        /* প্লাস মাইনাস স্টেক নব */
        .stake-nav-btn {
            background: #1c130c;
            color: #ffaa00;
            font-size: 24px;
            font-weight: 900;
            border: none;
            width: 35px;
            height: 35px;
            cursor: pointer;
        }

        /* 🚀 মাঝখানের মেগা ওরিজিনাল গোল্ডেন কাউবয় ঘূর্ণন চাকা বোতাম */
        .grand-spin-wheel-btn {
            width: 75px;
            height: 75px;
            background: radial-gradient(circle, #ffe082 0%, #cc6600 70%, #663300 100%);
            border: 4px solid #ffea00;
            border-radius: 50%;
            box-shadow: 0 6px 15px rgba(0,0,0,0.8), inset 0 2px 4px #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.1s ease;
        }
        .grand-spin-wheel-btn:active { transform: scale(0.93); }
        .spin-arrow-icon { width: 35px; height: 35px; border: 6px solid #241300; border-radius: 50%; border-top-color: transparent; }

        /* অটো বোতাম */
        .auto-text-btn {
            background: #140e0a;
            border: 2px solid #362216;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffaa00;
            font-size: 11px;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 4px 6px #000;
        }
        .auto-text-btn.active { background: #ffaa00; color: #000; }
    </style>
</head>
<body>

    <!-- 👑 ওপরে ঝুলন্ত ওরিজিনাল ওッズ কাঠের সিঁড়ি প্যানেল -->
    <div class="top-wooden-ladder">
        <div class="ladder-node-item" id="step-x1">X1024 X1</div>
        <div class="ladder-node-item" id="step-x2">X2</div>
        <div class="ladder-node-item" id="step-x4">X4</div>
        <div class="ladder-node-item" id="step-x8">X8</div>
    </div>

    <!-- 🏟️ ৩,৬০০ WAYS ডাবল সাইড নোটিশ ব্যানার -->
    <div class="ways-wooden-holder">
        <div class="ways-label">3600 WAYS</div>
        <div class="ways-label">3600 WAYS</div>
    </div>

    <!-- 🏟️ ওরিজিনাল ৩-৪-৫-৫-৪-৩ গ্রিড স্টেডিয়াম ক্যানভাস -->
    <div class="grid-stadium-canvas">
        
        <!-- ডানদিকের ভাসমান ফিচার বাই বাটন লক চ্যাম -->
        <div class="feature-buy-wood-btn" onclick="alert('🎉 FEATURE BUY: ১০০০০০% একুরেট বোনাস রাউন্ড মোড এক্টিভেটেড ওস্তাদ!')">FEATURE<br>BUY</div>

        <!-- কলাম ১ (৩ ঘর) -->
        <div class="column-pipe-node" id="col-0">
            <div class="card-slot-box col-h-3" id="slot-0-0"></div>
            <div class="card-slot-box col-h-3" id="slot-0-1"></div>
            <div class="card-slot-box col-h-3" id="slot-0-2"></div>
        </div>
                <!-- কলাম ২ (৪ ঘর) -->
        <div class="column-pipe-node" id="col-1">
            <div class="card-slot-box col-h-4" id="slot-1-0"></div>
            <div class="card-slot-box col-h-4" id="slot-1-1"></div>
            <div class="card-slot-box col-h-4" id="slot-1-2"></div>
            <div class="card-slot-box col-h-4" id="slot-1-3"></div>
        </div>
        <!-- কলাম ৩ (৫ ঘর) -->
        <div class="column-pipe-node" id="col-2">
            <div class="card-slot-box col-h-5" id="slot-2-0"></div>
            <div class="card-slot-box col-h-5" id="slot-2-1"></div>
            <div class="card-slot-box col-h-5" id="slot-2-2"></div>
            <div class="card-slot-box col-h-5" id="slot-2-3"></div>
            <div class="card-slot-box col-h-5" id="slot-2-4"></div>
        </div>
        <!-- কলাম ৪ (৫ ঘর) -->
        <div class="column-pipe-node" id="col-3">
            <div class="card-slot-box col-h-5" id="slot-3-0"></div>
            <div class="card-slot-box col-h-5" id="slot-3-1"></div>
            <div class="card-slot-box col-h-5" id="slot-3-2"></div>
            <div class="card-slot-box col-h-5" id="slot-3-3"></div>
            <div class="card-slot-box col-h-5" id="slot-3-4"></div>
        </div>
        <!-- কলাম ৫ (৪ ঘর) -->
        <div class="column-pipe-node" id="col-4">
            <div class="card-slot-box col-h-4" id="slot-4-0"></div>
            <div class="card-slot-box col-h-4" id="slot-4-1"></div>
            <div class="card-slot-box col-h-4" id="slot-4-2"></div>
            <div class="card-slot-box col-h-4" id="slot-4-3"></div>
        </div>
        <!-- কলাম ৬ (৩ ঘর) -->
        <div class="column-pipe-node" id="col-5">
            <div class="card-slot-box col-h-3" id="slot-5-0"></div>
            <div class="card-slot-box col-h-3" id="slot-5-1"></div>
            <div class="card-slot-box col-h-3" id="slot-5-2"></div>
        </div>
    </div>

    <!-- 📢 ওরিজিনাল স্ক্রিনশটের মিডল গোল্ডেন বার ড্যাশবোর্ড উইজেট -->
    <div class="center-dashboard-status">
        <div class="status-panel-sub">
            <div class="status-lbl">TOTAL WIN</div>
            <div class="status-val" id="win-display">Tk0.00</div>
        </div>
        <div class="status-panel-sub">
            <div class="status-lbl">WALLET</div>
            <div class="status-val" id="wallet-display">Tk0.00</div>
        </div>
        <div class="status-panel-sub">
            <div class="status-lbl">STAKE</div>
            <div class="status-val" id="bet-display">Tk50.00</div>
        </div>
    </div>

    <!-- 🎛️ একদম নিচের মেটালিক ওরিজিনাল PG SOFT কন্ট্রোল ফুটার প্যানেল -->
    <div class="bottom-metal-controls">
        <div class="action-flex-pack">
            <!-- টার্বো বাটন -->
            <div class="turbo-circle-btn" id="turbo-btn" onclick="toggleTurbo()">⚡</div>
            
            <!-- মাইনাস নব -->
            <button class="stake-nav-btn" onclick="adjustBet('minus')">-</button>
            
            <!-- 🚀 mমাঝখানের মেগা গোল্ডেন কাউবয় কিক স্পিন বাটন চাকা -->
            <div class="grand-spin-wheel-btn" id="spin-btn" onclick="handleWildBountySpinRoll()">
                <div class="spin-arrow-icon"></div>
            </div>
            
            <!-- প্লাস নব -->
            <button class="stake-nav-btn" onclick="adjustBet('plus')">+</button>
            
            <!-- AUTO বাটন -->
            <div class="auto-text-btn" id="auto-btn" onclick="toggleAuto()">AUTO</div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const urlUserId = urlParams.get('userId') || urlParams.get('id') || urlParams.get('username') || "logged_in_player";
        const urlWallet = urlParams.get('wallet') || "main";
        const SERVER_URL = window.location.origin;

        let balance = 0.00;
        let currentBet = 50; 
        let isSpinning = false;
        let isAuto = false;
        let isTurbo = false;
        let autoInterval = null;

        // ওরিজিনাল কলাম ভিত্তিক গ্রিড ঘর সংখ্যা ম্যাপিং (৩-৪-৫-৫-৪-৩ প্রোটোকল লক চ্যাম!)
        const gridRowsCountMap = { 0: 3, 1: 4, 2: 5, 3: 5, 4: 4, 5: 3 };

        const symbolImagesMap = {
            "BANDIT_WILD": "Bandit_Wild.png",
            "GOLD_BAR_SCATTER": "Gold_Bar_Scatter.png",
            "MASKED_BANDIT": "Masked_Bandit.png",
            "COWBOY_HAT": "Cowboy_Hat.png",
            "REVOLVER_PISTOL": "Revolver_Pistol.png",
            "CARD_ACE": "Card_Ace.png",
            "CARD_KING": "Card_King.png",
            "CARD_JACK": "Card_Jack.png",
            "CARD_Q": "Card_Q.png"
        };

        // ওরিজিনাল ৩-৪-৫-৫-৪-৩ ডিফোল্ট ক্যানভাস ইনিশিয়ালাইজার ভাই ভাই
        function setupOfficial3DWoodGrid() {
            for (let col = 0; col < 6; col++) {
                let rows = gridRowsCountMap[col];
                for (let row = 0; row < rows; row++) {
                    let box = document.getElementById(`slot-${col}-${row}`);
                    if (box) box.innerHTML = `<img src="Card_Ace.png" class="symbol-img-node" alt="bounty">`;
                }
            }
        }
        setupOfficial3DWoodGrid();

        async function fetchLivePlayerBalanceSync() {
            try {
                const res = await fetch(`${SERVER_URL}/api/slot-balance?userId=${urlUserId}&wallet=${urlWallet}&gameName=wildbounty`);
                const data = await res.json();
                if (data && data.success) {
                    balance = parseFloat(data.balance);
                    document.getElementById("wallet-display").innerText = `Tk${balance.toFixed(2)}`;
                    if (window.parent) window.parent.postMessage({ action: "refresh_wallet" }, "*");
                }
            } catch (e) {}
        }
        fetchLivePlayerBalanceSync();

        function adjustBet(action) {
            if (isSpinning) return;
            if (action === 'minus' && currentBet > 50) currentBet -= 50;
            if (action === 'plus' && currentBet < 20000) currentBet += 50;
            document.getElementById("bet-display").innerText = `Tk${currentBet.toFixed(2)}`;
        }

        function toggleTurbo() {
            isTurbo = !isTurbo;
            document.getElementById("turbo-btn").classList.toggle('active', isTurbo);
        }

        function toggleAuto() {
            isAuto = !isAuto;
            document.getElementById("auto-btn").classList.toggle('active', isAuto);
            if (isAuto && !isSpinning) handleWildBountySpinRoll();
        }

        // 🎰 [🎰 ৩-৪-৫-৫-৪-৩ মেগা ক্যাস্কেডিং ড্রপ ৩D অ্যানিমেশন ইঞ্জিন]
        function animateOfficial3DWoodGrid(serverGameData) {
            resetMultiplierLadderGlow();
            
            // ৩,৬০০ ওয়েজ ডাইনামিক ম্যাট্রিক্স জেনারেটর পাইপলাইন চ্যাম
            let matrixResult = serverGameData.finalReelsResultMatrix || ["CARD_ACE", "CARD_KING", "BANDIT_WILD", "CARD_ACE", "CARD_Q", "CARD_KING"];

            // ১. ওয়ান শটে সব খোপে ব্লর ড্রপ অ্যানিমেশন স্টার্ট
            for (let col = 0; col < 6; col++) {
                let rows = gridRowsCountMap[col];
                for (let row = 0; row < rows; row++) {
                    let box = document.getElementById(`slot-${col}-${row}`);
                    if (box) box.className = `card-slot-box col-h-${rows} drop-cascading-blur`;
                }
            }

            // ২. বাম থেকে ডানে কলাম ভিত্তিক সিকোয়েন্সিয়াল ক্যাস্কেড সেটেলমেন্ট
            let colIndex = 0;
            let stopInterval = setInterval(() => {
                if (colIndex < 6) {
                    let rows = gridRowsCountMap[colIndex];
                    for (let row = 0; row < rows; row++) {
                        let box = document.getElementById(`slot-${colIndex}-${row}`);
                        if (box) {
                            box.className = `card-slot-box col-h-${rows}`;
                            // র্যান্ডমলি পুল থেকে ওরিজিনাল ৩D সিম্বল পুশ লক ওস্তাদ!
                            let randomSymKey = bountySymbolsPool[Math.floor(Math.random() * bountySymbolsPool.length)];
                            if (colIndex === 2 && row === 1) randomSymKey = matrixResult[colIndex] || "BANDIT_WILD";
                            let imgFile = symbolImagesMap[randomSymKey] || "Card_Ace.png";
                            box.innerHTML = `<img src="${imgFile}" class="symbol-img-node" alt="bounty">`;
                        }
                    }
                    colIndex++;
                } else {
                    clearInterval(stopInterval);
                    if (serverGameData.balance !== undefined) {
                        balance = parseFloat(serverGameData.balance);
                        document.getElementById("wallet-display").innerText = `Tk${balance.toFixed(2)}`;
                    }
                    
                    document.getElementById("win-display").innerText = `Tk${parseFloat(serverGameData.winAmount || 0).toFixed(2)}`;
                    updateMultiplierLadderGlow(serverGameData.winMultiplier);
                    stopWildBountyState();
                }
            }, isTurbo ? 100 : 250); // ⚡ টার্বো অন থাকলে মাত্র ১০০ মিলি-সেকেন্ডে ফটাফট সুপার ফাস্ট ড্রপ লক চ্যাম!
        }

        function updateMultiplierLadderGlow(multiplier) {
            resetMultiplierLadderGlow();
            if (multiplier >= 8) document.getElementById("step-x8").className = "ladder-node-item active";
            else if (multiplier >= 4) document.getElementById("step-x4").className = "ladder-node-item active";
            else if (multiplier >= 2) document.getElementById("step-x2").className = "ladder-node-item active";
            else document.getElementById("step-x1").className = "ladder-node-item active";
        }

                function resetMultiplierLadderGlow() {
            document.getElementById("step-x1").className = "ladder-node-item";
            document.getElementById("step-x2").className = "ladder-node-item";
            document.getElementById("step-x4").className = "ladder-node-item";
            document.getElementById("step-x8").className = "ladder-node-item";
        }

        async function handleWildBountySpinRoll() {
            if (isSpinning) return; 
            isSpinning = true;
            document.getElementById("spin-btn").style.opacity = "0.5";

            try {
                const response = await fetch(`${SERVER_URL}/api/slot-spin`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: urlUserId, amount: parseFloat(currentBet), wallet: urlWallet, gameName: "wildbounty" })
                });
                const serverRes = await response.json();
                if (serverRes.success) {
                    animateOfficial3DWoodGrid(serverRes.gameData || serverRes);
                } else {
                    alert(serverRes.message || "❌ ব্যালেন্স অপ্রতুল ওস্তাদ!");
                    stopWildBountyState();
                }
            } catch (err) { stopWildBountyState(); }
        }

        function stopWildBountyState() {
            isSpinning = false;
            document.getElementById("spin-btn").style.opacity = "1";
            if (isAuto) {
                autoInterval = setTimeout(() => { if (isAuto) handleWildBountySpinRoll(); }, 3500);
            }
        }

        const slotSounds = {
            click: new Audio('spin2.mp3'),
            spin: new Audio('spin2.mp3'),
            win: new Audio('win2.mp3'),
            wheel: new Audio('spin2.mp3')
        };
        Object.values(slotSounds).forEach(s => s.load());

        function playAudio(type) {
            try { if(slotSounds[type]) { slotSounds[type].currentTime = 0; slotSounds[type].play().catch(e => {}); } } catch(e) {}
        }
    </script>
</body>
</html>
