<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WILD BOUNTY BANDITS - PG SOFT OFFICIAL 3D SLOTS</title>
    <style>
        /* 🎨 ওরিজিনাল ৩-৪-৫-৫-৪-৩ কাউবয় মেগা থ্রি-ডি এরিনা সিএসএস ইনজেকশন ভাই ভাই */
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #050302; font-family: 'Segoe UI', Roboto, sans-serif; color: #fff; -webkit-tap-highlight-color: transparent; user-select: none; }
        .header { display: none !important; } 

        body { 
            background: radial-gradient(circle at center, #2e1d0f 0%, #060402 100%); 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            height: 100vh; 
            position: relative;
        }

        /* 👑 ওপরে রশি দিয়ে ঝুলন্ত বাঁকা কাঠের তক্তার ওরিজিনাল ওッズ ট্র্যাকার  */
        .top-wooden-ladder {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 430px;
            margin: 12px auto 0 auto;
            padding: 8px 18px;
            box-sizing: border-box;
            background: linear-gradient(180deg, #3d220f 0%, #170b04 100%);
            border: 3px solid #54341b;
            border-radius: 14px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.8), inset 0 2px 4px rgba(255,255,255,0.05);
            z-index: 10;
        }

        .ladder-node-item {
            font-size: 13px;
            font-weight: 900;
            color: #704724;
            text-shadow: 2px 2px 3px rgba(0,0,0,0.95);
            transition: all 0.2s ease;
            text-transform: uppercase;
        }

        .ladder-node-item.active {
            background: linear-gradient(180deg, #ffe082 0%, #ffb300 50%, #ff8f00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 16px;
            transform: scale(1.1);
            filter: drop-shadow(0px 0px 8px rgba(255,170,0,0.6));
        }

        /* 🏟️ ৩,৬০০ WAYS দুই সাইডের নোটিশ ব্যানার */
        .ways-wooden-holder {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 430px;
            margin: 6px auto 0 auto;
            padding: 0 10px;
            box-sizing: border-box;
            z-index: 10;
        }

        .ways-label {
            font-size: 11px;
            font-weight: 900;
            color: #a8713b;
            background: linear-gradient(180deg, #1f1107 0%, #0d0602 100%);
            padding: 4px 14px;
            border-radius: 6px;
            border: 1px solid #361e0e;
            text-shadow: 1px 1px 2px #000;
            letter-spacing: 0.8px;
            box-shadow: 0 3px 6px rgba(0,0,0,0.5);
        }

        /* 🏟️ ওরিজিনাল ৩-৪-৫-৫-৪-৩ ডাইনামিক গ্রিড ক্যানভাস এরিনা */
        .grid-stadium-canvas {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 450px;
            height: 380px; 
            margin: 8px auto;
            padding: 0 12px;
            box-sizing: border-box;
            position: relative;
            z-index: 5;
        }

        .column-pipe-node {
            width: 15%;
            display: flex;
            flex-direction: column;
            gap: 5px;
            height: 100%;
            justify-content: center;
        }

        .card-slot-box {
            background: linear-gradient(180deg, #0f0703 0%, #050201 100%);
            border: 2px solid #241308;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.95);
            box-sizing: border-box;
        }

        .col-h-3 { height: 26%; }
        .col-h-4 { height: 20%; }
        .col-h-5 { height: 16%; }

        /* 🚪 FEATURE BUY বাটন */
        .feature-buy-wood-btn {
            position: absolute;
            right: 18px;
            bottom: 25px;
            background: linear-gradient(180deg, #5c381a 0%, #2e1908 100%);
            border: 2px solid #7a4b24;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 900;
            color: #ffcc66;
            text-transform: uppercase;
            text-align: center;
            box-shadow: 0 6px 12px rgba(0,0,0,0.6), inset 0 1px 2px rgba(255,255,255,0.1);
            z-index: 20;
            cursor: pointer;
            line-height: 1.3;
        }

        /* 📢 ওরিজিনাল মিডল বার ড্যাশবোর্ড উইজেট */
        .center-dashboard-status {
            width: 100%;
            max-width: 430px;
            margin: 0 auto;
            background: linear-gradient(180deg, #241408 0%, #0d0602 100%);
            border: 2px solid #4a2b14;
            border-radius: 12px;
            padding: 10px 15px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .status-panel-sub { text-align: center; flex: 1; }
        .status-lbl { font-size: 10px; color: #8c5e35; font-weight: 900; letter-spacing: 0.5px; margin-bottom: 2px; }
        .status-val { font-size: 15px; font-weight: 900; color: #ffffff; text-shadow: 1px 1px 2px #000; }

        /* 🎛️ একদম নিচের মেটালিক কন্ট্রোল ফুটার */
        .bottom-metal-controls {
            background: #030201;
            border-top: 2px solid #1a0f05;
            padding: 18px 24px 45px 24px; 
            box-shadow: 0 -8px 30px rgba(0,0,0,0.9);
            z-index: 100;
        }

        .action-flex-pack {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 450px;
            margin: 0 auto;
        }

        .turbo-circle-btn {
            background: linear-gradient(180deg, #1c130c 0%, #0d0805 100%);
            border: 2px solid #3d2819;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #d4912a;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.6);
        }

        .turbo-circle-btn.active {
            background: radial-gradient(circle, #ffe082 0%, #ff9100 100%);
            color: #000000;
            border-color: #fff;
            box-shadow: 0 0 15px rgba(255,145,0,0.6);
        }

        .stake-nav-btn {
            background: transparent;
            color: #ffaa00;
            font-size: 26px;
            font-weight: 900;
            border: none;
            width: 40px;
            height: 40px;
            cursor: pointer;
        }

        /* 🚀 মাঝখানের মেগা গোল্ডেন কাউবয় ঘূর্ণন চাকা বোতাম */
        .grand-spin-wheel-btn {
            width: 76px;
            height: 76px;
            background: radial-gradient(circle, #fff3cc 0%, #ffaa00 50%, #994c00 100%);
            border: 4px solid #ffea00;
            border-radius: 50%;
            box-shadow: 0 6px 20px rgba(0,0,0,0.85), inset 0 2px 5px rgba(255,255,255,0.5);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .spin-arrow-icon {
            width: 36px;
            height: 36px;
            border: 6px solid #241300;
            border-radius: 50%;
            border-top-color: transparent;
            box-sizing: border-box;
            transform: rotate(45deg);
        }

        .auto-text-btn {
            background: linear-gradient(180deg, #1c130c 0%, #0d0805 100%);
            border: 2px solid #3d2819;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #d4912a;
            font-size: 11px;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.6);
            text-transform: uppercase;
        }

        .auto-text-btn.active {
            background: radial-gradient(circle, #ffe082 0%, #ff9100 100%);
            color: #000000;
            border-color: #fff;
            box-shadow: 0 0 15px rgba(255,145,0,0.6);
        }

        /* 🌀 ওরিজিনাল নিওন টেক্সট স্পিনিং এনিমেশন বর্ম */
        .drop-cascading-blur {
            animation: cascadeDropAnim 0.11s linear infinite !important;
        }

        @keyframes cascadeDropAnim {
            0% { transform: translateY(-15px); filter: blur(3px); opacity: 0.7; }
            50% { transform: translateY(15px); filter: blur(3px); opacity: 0.7; }
            100% { transform: translateY(-15px); filter: blur(3px); opacity: 0.7; }
        }
    </style>
</head>
<body>

    <!-- 👑 ওপরে ওッズ কাঠের সিঁড়ি প্যানেল -->
    <div class="top-wooden-ladder">
        <div class="ladder-node-item active" id="step-x1">X1024 X1</div>
        <div class="ladder-node-item" id="step-x2">X2</div>
        <div class="ladder-node-item" id="step-x4">X4</div>
        <div class="ladder-node-item" id="step-x8">X8</div>
    </div>

    <div class="ways-wooden-holder">
        <div class="ways-label">3600 WAYS</div>
        <div class="ways-label">3600 WAYS</div>
    </div>

            <!-- 🎰 অরিজিনাল ৩-৪-৫-৫-৪-৩ গ্রিড স্টেডিয়াম ক্যানভাস এরিনা -->
        <div class="grid-stadium-canvas">
            <div class="feature-buy-wood-btn" onclick="alert('🎉 FEATURE BUY Mode Activated!')">FEATURE<br>BUY</div>

            <div class="column-pipe-node" id="col-0">
                <div class="card-slot-box col-h-3" id="slot-0-0"></div>
                <div class="card-slot-box col-h-3" id="slot-0-1"></div>
                <div class="card-slot-box col-h-3" id="slot-0-2"></div>
            </div>
            <div class="column-pipe-node" id="col-1">
                <div class="card-slot-box col-h-4" id="slot-1-0"></div>
                <div class="card-slot-box col-h-4" id="slot-1-1"></div>
                <div class="card-slot-box col-h-4" id="slot-1-2"></div>
                <div class="card-slot-box col-h-4" id="slot-1-3"></div>
            </div>
            <div class="column-pipe-node" id="col-2">
                <div class="card-slot-box col-h-5" id="slot-2-0"></div>
                <div class="card-slot-box col-h-5" id="slot-2-1"></div>
                <div class="card-slot-box col-h-5" id="slot-2-2"></div>
                <div class="card-slot-box col-h-5" id="slot-2-3"></div>
                <div class="card-slot-box col-h-5" id="slot-2-4"></div>
            </div>
            <div class="column-pipe-node" id="col-3">
                <div class="card-slot-box col-h-5" id="slot-3-0"></div>
                <div class="card-slot-box col-h-5" id="slot-3-1"></div>
                <div class="card-slot-box col-h-5" id="slot-3-2"></div>
                <div class="card-slot-box col-h-5" id="slot-3-3"></div>
                <div class="card-slot-box col-h-5" id="slot-3-4"></div>
            </div>
            <div class="column-pipe-node" id="col-4">
                <div class="card-slot-box col-h-4" id="slot-4-0"></div>
                <div class="card-slot-box col-h-4" id="slot-4-1"></div>
                <div class="card-slot-box col-h-4" id="slot-4-2"></div>
                <div class="card-slot-box col-h-4" id="slot-4-3"></div>
            </div>
            <div class="column-pipe-node" id="col-5">
                <div class="card-slot-box col-h-3" id="slot-5-0"></div>
                <div class="card-slot-box col-h-3" id="slot-5-1"></div>
                <div class="card-slot-box col-h-3" id="slot-5-2"></div>
            </div>
        </div>

        <!-- 📢 মিডল বার উইজেট -->
        <div class="center-dashboard-status">
            <div class="status-panel-sub"><div class="status-lbl">TOTAL WIN</div><div class="status-val" id="win-display">Tk0.00</div></div>
            <div class="status-panel-sub"><div class="status-lbl">WALLET</div><div class="status-val" id="wallet-display">Tk0.00</div></div>
            <div class="status-panel-sub"><div class="status-lbl">STAKE</div><div class="status-val" id="bet-display">Tk50.00</div></div>
        </div>

        <!-- 🎛️ নিচের মেইন কন্ট্রোল ফুটার প্যানেল -->
        <div class="bottom-metal-controls">
            <div class="action-flex-pack">
                <div class="turbo-circle-btn" id="turbo-btn" onclick="toggleTurbo()">⚡</div>
                <button class="stake-nav-btn" onclick="adjustBet('minus')">-</button>
                <div class="grand-spin-wheel-btn" id="spin-btn" onclick="handleWildBountySpinRoll()">
                    <div class="spin-arrow-icon"></div>
                </div>
                <button class="stake-nav-btn" onclick="adjustBet('plus')">+</button>
                <div class="auto-text-btn" id="auto-btn" onclick="toggleAuto()">AUTO</div>
            </div>
        </div>

        <script src="/socket.io/socket.io.js"></script>
        <script>
            const urlParams = new URLSearchParams(window.location.search);
            const urlUserId = urlParams.get('userId') || urlParams.get('id') || urlParams.get('username') || "logged_in_player";
            const urlWallet = urlParams.get('wallet') || "main";
            const SERVER_URL = window.location.origin;

            let balance = 0.00;
            let currentBet = 50; 
            let isSpinning = false;
            let isAuto = false;
            let isTurbo = false;
            let autoInterval = null;

            const gridRowsCountMap = { 0: 3, 1: 4, 2: 5, 3: 5, 4: 4, 5: 3 };

            // 🏟️ টেক্সট ইনিশিয়ালাইজার (কোনো ছবির ব্যাকআপ ছাড়াই ওয়ান-শটে স্ক্রিন সচল লক!)
            function setupOfficialTextGrid() {
                for (let col = 0; col < 6; col++) {
                    let rows = gridRowsCountMap[col];
                    for (let row = 0; row < rows; row++) {
                        let box = document.getElementById(`slot-${col}-${row}`);
                        if (box) box.innerHTML = `<span style="font-size:18px; font-weight:900; color:#ffaa00; text-shadow:0 0 5px #ff5500;">A</span>`;
                    }
                }
            }
            setupOfficialTextGrid();

            async function fetchLivePlayerBalanceSync() {
                try {
                    const res = await fetch(`${SERVER_URL}/api/slot-balance?userId=${urlUserId}&wallet=${urlWallet}&gameName=wildbounty`);
                    const data = await res.json();
                    if (data && data.success) {
                        balance = parseFloat(data.balance);
                        document.getElementById("wallet-display").innerText = `Tk${balance.toFixed(2)}`;
                        if (window.parent) window.parent.postMessage({ action: "refresh_wallet" }, "*");
                    }
                } catch (e) {}
            }
            fetchLivePlayerBalanceSync();

            function adjustBet(action) {
                if (isSpinning) return;
                if (action === 'minus' && currentBet > 50) currentBet -= 50;
                if (action === 'plus' && currentBet < 20000) currentBet += 50;
                document.getElementById("bet-display").innerText = `Tk${currentBet.toFixed(2)}`;
            }

            function toggleTurbo() {
                isTurbo = !isTurbo;
                document.getElementById("turbo-btn").classList.toggle('active', isTurbo);
            }

            function toggleAuto() {
                isAuto = !isAuto;
                document.getElementById("auto-btn").classList.toggle('active', isAuto);
                if (isAuto && !isSpinning) handleWildBountySpinRoll();
            }

            // 🎰 [🔒 পাইপライン ডেডিকেটেড ক্যাচিং ইঞ্জিন ফিক্স ভাই ভাই]
            function animateOfficial3DWoodGrid(serverGameData) {
                let targetPayload = serverGameData.gameData || serverGameData;
                let matrixResult = targetPayload.finalReelsResultMatrix || ["CARD_ACE", "CARD_KING", "BANDIT_WILD", "CARD_ACE", "CARD_Q", "CARD_KING"];

                // ১. ঘরগুলোতে ওরিজিনাল পিউর নিয়ন স্পিনিং এনিমেশন প্লাগইন এক্টিভেট!
                for (let col = 0; col < 6; col++) {
                    let rows = gridRowsCountMap[col];
                    for (let row = 0; row < rows; row++) {
                        let box = document.getElementById(`slot-${col}-${row}`);
                        if (box) {
                            box.innerHTML = `<div class="drop-cascading-blur" style="font-size:22px; font-weight:900; color:#ffcc00; text-shadow:0 0 8px #ff2200;">K</div>`;
                        }
                    }
                }

                // ২. বাম থেকে ডানে সিকোয়েন্সিয়াল সেটেলমেন্ট ঘূর্ণন সচল লক!
                let colIndex = 0;
                let stopInterval = setInterval(() => {
                    if (colIndex < 6) {
                        let rows = gridRowsCountMap[colIndex];
                        const characterPool = ["A", "K", "Q", "J", "WILD", "BONUS"];
                        for (let row = 0; row < rows; row++) {
                            let box = document.getElementById(`slot-${colIndex}-${row}`);
                            if (box) {
                                let randomChar = characterPool[Math.floor(Math.random() * characterPool.length)];
                                if (colIndex === 2 && row === 1) {
                                    let sName = matrixResult[colIndex] || "CARD_ACE";
                                    randomChar = sName.replace("CARD_", "").replace("_WILD", " WILD").replace("_SCATTER", " BONUS");
                                }
                                let colorStyle = randomChar.includes("WILD") ? "#00ff88" : (randomChar.includes("BONUS") ? "#ff0055" : "#ffaa00");
                                box.innerHTML = `<span style="font-size:18px; font-weight:900; color:${colorStyle}; text-shadow:1px 1px 2px #000;">${randomChar}</span>`;
                            }
                        }
                        colIndex++;
                    } else {
                        clearInterval(stopInterval);
                        if (serverGameData.balance !== undefined) {
                            balance = parseFloat(serverGameData.balance);
                        } else if (targetPayload.balance !== undefined) {
                            balance = parseFloat(targetPayload.balance);
                        }
                        document.getElementById("wallet-display").innerText = `Tk${balance.toFixed(2)}`;
                        
                        let finalWin = targetPayload.winAmount !== undefined ? targetPayload.winAmount : 0;
                        document.getElementById("win-display").innerText = `Tk${parseFloat(finalWin).toFixed(2)}`;
                        
                        updateMultiplierLadderGlow(targetPayload.winMultiplier || 0);
                        stopWildBountyState(targetPayload);
                    }
                }, isTurbo ? 80 : 200); 
            }

                  function updateMultiplierLadderGlow(multiplier) {
            resetMultiplierLadderGlow();
            if (multiplier >= 8) document.getElementById("step-x8").className = "ladder-node-item active";
            else if (multiplier >= 4) document.getElementById("step-x4").className = "ladder-node-item active";
            else if (multiplier >= 2) document.getElementById("step-x2").className = "ladder-node-item active";
            else document.getElementById("step-x1").className = "ladder-node-item active";
        }

        function resetMultiplierLadderGlow() {
            document.getElementById("step-x1").className = "ladder-node-item";
            document.getElementById("step-x2").className = "ladder-node-item";
            document.getElementById("step-x4").className = "ladder-node-item";
            document.getElementById("step-x8").className = "ladder-node-item";
        }

        async function handleWildBountySpinRoll() {
            if (isSpinning) return; 
            isSpinning = true;
            document.getElementById("spin-btn").style.opacity = "0.5";

            try {
                const response = await fetch(`${SERVER_URL}/api/slot-spin`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: urlUserId, amount: parseFloat(currentBet), wallet: urlWallet, gameName: "wildbounty" })
                });
                const serverRes = await response.json();
                if (serverRes.success) {
                    animateOfficial3DWoodGrid(serverRes);
                } else {
                    alert(serverRes.message || "❌ ব্যালেন্স অপ্রতুল ওস্তাদ!");
                    stopWildBountyState();
                }
            } catch (err) { stopWildBountyState(); }
        }

        function stopWildBountyState(payload) {
            isSpinning = false;
            document.getElementById("spin-btn").style.opacity = "1";
            let spinsLeft = payload && payload.freeSpinsLeft ? payload.freeSpinsLeft : 0;
            if (isAuto || spinsLeft > 0) {
                autoInterval = setTimeout(() => { handleWildBountySpinRoll(); }, 3500);
            }
        }
    </script>
</body>
</html>
